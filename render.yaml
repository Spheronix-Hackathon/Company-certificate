services:
  # ----------------------------------------
  # BACKEND - Node.js Express API
  # ----------------------------------------
  - type: web
    name: certificate-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false # Render will prompt you for this value in the dashboard
      - key: JWT_SECRET
        generateValue: true # Automatically generates a secure random string
      - key: FRONTEND_URL
        value: https://certificates.spheronixtechnology.com

  # ----------------------------------------
  # FRONTEND - React (Vite) Static Site
  # ----------------------------------------
  - type: web
    name: certificate-frontend
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_BACKEND_URL
        # You will need to update this to your actual backend Render URL later
        value: https://certificate-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
